name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy psycopg2-binary pydantic-settings python-jose[cryptography] bcrypt celery redis pytest httpx email-validator

      - name: Rodar testes
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-secret-key-para-testes
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/ -v